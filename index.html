<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kluemark</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
}

h1{
font-size:60px;
letter-spacing:3px;
margin-bottom:15px;
}

.tagline{
font-size:20px;
color:#d1d1d1;
margin-bottom:35px;
line-height:1.6;
}

.status{
display:inline-block;
padding:12px 28px;
border:1px solid #fff;
border-radius:50px;
margin-bottom:35px;
font-size:15px;
}

p{
color:#bdbdbd;
line-height:1.8;
margin-bottom:15px;
}

a{
color:#fff;
text-decoration:none;
}

footer{
margin-top:40px;
font-size:14px;
color:#777;
}

@media(max-width:768px){

h1{
font-size:42px;
}

.tagline{
font-size:17px;
}

}
</style>

</head>

<body>

<div class="container">

<h1>KLUEMARK</h1>

<div class="tagline">
Every Great Brand Starts with a Klue and Leaves Its Mark.
</div>

<div class="status">
🚀 Website Under Construction
</div>

<p>
We're building something meaningful.
Our website will be launching soon.
</p>

<p>
📧 Contact:
<a href="mailto:contact.kluemark@gmail.com">
contact.kluemark@gmail.com
</a>
</p>

<footer>
© 2026 Kluemark. All Rights Reserved.
</footer>

</div>

</body>
</html>
